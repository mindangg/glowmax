<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <linearGradient id="iridescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#9bf8f4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffb6ff" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#ffd166" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="glass-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g transform="translate(100, 100) rotate(-20) translate(-100, -100)">
    
    <rect x="40" y="75" width="120" height="50" rx="25" ry="25" 
          fill="url(#iridescent)" 
          stroke="#ffffff" stroke-width="2" stroke-opacity="0.8" 
          filter="url(#shadow)"/>

    <line x1="100" y1="75" x2="100" y2="125" 
          stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>

    <rect x="45" y="78" width="110" height="20" rx="10" ry="10" 
          fill="url(#glass-highlight)"/>
          
    <path d="M 65 120 Q 100 125 135 120" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.5"/>
  </g>
</svg>
