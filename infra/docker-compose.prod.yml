# Production stack chạy trên EC2 t4g.small
# 3 services: Caddy (HTTPS reverse proxy) + Spring Boot API + Postgres
#
# Deploy:
#   cd /opt/glowmax/infra
#   cp .env.prod.example .env.prod && chmod 600 .env.prod
#   # ... edit .env.prod với secrets thật ...
#   docker compose -f docker-compose.prod.yml up -d
#
# Update khi có image mới:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# TODO khi setup lần đầu:
#   1. Đổi <YOUR_GITHUB_USERNAME> trong api.image
#   2. Tạo .env.prod từ .env.prod.example
#   3. Tạo Postgres app user least-privilege (xem README section "Database hardening")

services:
  caddy:
    image: caddy:2-alpine
    container_name: glowmax-caddy
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP → Caddy auto-redirect sang HTTPS
      - "443:443"   # HTTPS với Let's Encrypt cert
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # Lưu cert (KHÔNG xóa volume này, mất cert phải re-issue)
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - glowmax-net

  api:
    # TODO: thay <YOUR_GITHUB_USERNAME> bằng username thật
    image: ghcr.io/<YOUR_GITHUB_USERNAME>/glowmax-api:latest
    container_name: glowmax-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # Override: Spring Boot kết nối tới container postgres qua hostname `postgres`
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/glowmax
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - glowmax-net
    # KHÔNG expose ports ra host — Caddy proxy qua Docker network
    # Nếu cần debug: docker exec -it glowmax-api sh

  postgres:
    image: postgres:16-alpine
    container_name: glowmax-postgres
    restart: unless-stopped
    # CRITICAL: bind 127.0.0.1 only — KHÔNG expose Postgres ra public
    # Backend trong cùng Docker network vẫn connect được qua hostname `postgres`
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: glowmax
      POSTGRES_USER: ${DB_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${DB_SUPERUSER_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - glowmax-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SUPERUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:    # Let's Encrypt certs — backup volume này nếu re-deploy
  caddy_config:
  pg_data:       # Postgres data — backup qua scripts/backup-db.sh

networks:
  glowmax-net:
    driver: bridge
