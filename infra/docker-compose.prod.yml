# Production stack chạy trên EC2 t4g.small
# 2 services: Caddy (HTTPS reverse proxy) + Spring Boot API
# Database: AWS RDS PostgreSQL 17 (managed)
#
# Deploy:
#   cd /opt/glowmax
#   docker compose -f docker-compose.prod.yml up -d
#
# Update khi có image mới:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: glowmax-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - glowmax-net

  api:
    image: ghcr.io/mindangg/glowmax-api:latest
    container_name: glowmax-api
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - glowmax-net

volumes:
  caddy_data:
  caddy_config:

networks:
  glowmax-net:
    driver: bridge
