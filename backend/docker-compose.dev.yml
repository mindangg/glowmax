services:
  postgres:
    image: postgres:17-alpine
    container_name: glowmax-postgres-dev
    environment:
      POSTGRES_DB: glowmax
      POSTGRES_USER: glowmax
      POSTGRES_PASSWORD: glowmax
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowmax -d glowmax"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
