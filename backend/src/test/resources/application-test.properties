# Test profile — dùng H2 in-memory thay vì Postgres
# H2 không hiểu PostgreSQL-specific SQL (gen_random_uuid, trigger syntax)
# nên tắt Flyway, để Hibernate tự tạo schema từ @Entity

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Tắt Flyway trong test (migrations dùng PostgreSQL-specific SQL)
spring.flyway.enabled=false

# JWT key test (32+ bytes = 256 bits cho HS256)
app.jwt.secret=test-secret-key-minimum-256-bits-for-hs256-algorithm
app.jwt.access-token-ttl-seconds=900
app.jwt.issuer=glowmax-test
app.jwt.audience=glowmax-mobile

# S3 — không gọi thật trong test
app.aws.region=ap-southeast-1
app.aws.s3.bucket=glowmax-test-bucket
app.aws.access-key=test
app.aws.secret-key=test

# OpenAI — không gọi thật trong test
app.openai.api-key=test-key
app.openai.base-url=http://localhost:9999
