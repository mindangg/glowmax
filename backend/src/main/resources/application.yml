# ════════════════════════════════════════════════════════════════
# Glowmax Backend — single config, env-driven
# Override per environment qua env vars (.env hoặc AWS Parameter Store)
# ════════════════════════════════════════════════════════════════

spring:
  application:
    name: glowmax-api

  # ─── Database ────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/glowmax}
    username: ${DB_USERNAME:glowmax}
    password: ${DB_PASSWORD:changeme}

  # ─── Jackson JSON serialization ─────────────────────────────────
  # snake_case để frontend types (TypeScript) hoạt động không cần mapping
  # Ví dụ: combinedScore → combined_score, pslTier → psl_tier
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  # ─── JPA / Hibernate ─────────────────────────────────────────────
  jpa:
    open-in-view: false               # tắt OSIV anti-pattern
    hibernate:
      ddl-auto: validate              # KHÔNG bao giờ update/create ở prod; Flyway lo schema
    properties:
      hibernate:
        jdbc.time_zone: UTC

  # ─── Flyway ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ─── Server ───────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-stacktrace: never         # KHÔNG leak stacktrace

# ─── Actuator (health only ra public) ────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ─── App custom config ────────────────────────────────────────────
glowmax:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
    issuer: ${JWT_ISSUER:api.glowmax.codes}
    audience: ${JWT_AUDIENCE:glowmax-mobile}

  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    apple:
      client-id: ${APPLE_CLIENT_ID:}
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key-path: ${APPLE_PRIVATE_KEY_PATH:}

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout-seconds: 60

  aws:
    region: ${AWS_REGION:ap-southeast-1}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    s3-avatar-bucket: ${S3_AVATAR_BUCKET:glowmax-leaderboard-avatars}
    s3-avatar-public-url-prefix: ${S3_AVATAR_PUBLIC_URL_PREFIX:https://glowmax-leaderboard-avatars.s3.ap-southeast-1.amazonaws.com}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,exp://localhost:19000,glowmax://}

# ─── Logging ─────────────────────────────────────────────────────
logging:
  level:
    com.glowmax: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
