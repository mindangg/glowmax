# =============================================================================
# backend.yml — CI/CD cho Spring Boot backend
# =============================================================================
# 1 file, 2 jobs:
#   - test:                Mỗi PR + push main → ./mvnw verify (compile + H2 test)
#   - build-and-deploy:    Chỉ khi push main + test pass → build ARM64 → ghcr.io → SSH EC2
#
# GitHub Secrets cần setup (Settings → Secrets and variables → Actions):
#   - EC2_HOST       Elastic IP của EC2 (vd 52.74.xxx.xxx)
#   - EC2_USER       ec2-user
#   - EC2_SSH_KEY    Private key content (.pem file content full, kể cả header/footer)
#
# GitHub repo settings (1-click, không phải workflow):
#   - Settings → Code security → Dependabot alerts + security updates: ON
#   - Settings → Code security → Secret scanning: ON
#   - Settings → Branches → Branch protection cho main:
#       require PR before merging, require status checks: 'test' job pass
# =============================================================================

name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# PR mới push → cancel run cũ đang chạy (tiết kiệm CI minutes)
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

